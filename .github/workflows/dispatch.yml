name: Exact-time dispatcher

# GitHub cron starts scheduled runs late — minutes off-peak, HOURS in the
# congested 00:00-02:00 UTC window. This job wakes EARLY on staggered crons,
# sleeps to the exact target second, then fires workflow_dispatch at the
# configured repository so its run STARTS on time.
#
# All identifying configuration (target repo, workflow files, times) lives in
# the DISPATCH_CONFIG secret, and log output is kept generic — this repo is
# public (for unlimited Actions minutes) and run logs are world-readable.
# Config-derived values must NEVER reach the log: jq/date stderr is discarded
# and all echoes use generic job indices.
#
# Secrets:
#   DISPATCH_TOKEN  — token with repo+workflow scope on the target repository
#   DISPATCH_CONFIG — JSON: {"repo":"owner/name","jobs":[{"workflow":"file.yml",
#                     "sgt":"HH:MM","dow":"Mon"?}, ...]}  (times in Asia/Singapore,
#                     two-digit 24h HH:MM; "dow" optional three-letter day filter)

# Six staggered wakes: on 2026-06-12 GitHub delayed ALL of 22:37/23:07/23:37
# by 90-150 min and the first dispatch ran 14 min late — wake much earlier so
# even multi-hour delays can't miss the first target (sleeping is free here).
on:
  schedule:
    - cron: '37 20 * * *'   # wake 04:37 SGT
    - cron: '7 21 * * *'    # backup wake 05:07 SGT
    - cron: '37 21 * * *'   # backup wake 05:37 SGT
    - cron: '37 22 * * *'   # backup wake 06:37 SGT
    - cron: '7 23 * * *'    # backup wake 07:07 SGT
    - cron: '37 23 * * *'   # backup wake 07:37 SGT
  workflow_dispatch:
    inputs:
      test_mode:
        description: 'Test — dispatch each due target NOW as a dry-run (no waiting, no real send)'
        type: boolean
        default: true

# Scheduled wakes share one group (backups queue behind the sleeping primary);
# manual runs get their own group so test_mode really does run NOW.
concurrency:
  group: ${{ github.event_name == 'schedule' && 'dispatcher' || format('dispatcher-manual-{0}', github.run_id) }}
  cancel-in-progress: false

permissions:
  contents: write   # keep-alive commits (GitHub disables schedules after 60 days without commits)

jobs:
  dispatch:
    runs-on: ubuntu-latest
    timeout-minutes: 300
    env:
      GH_TOKEN: ${{ secrets.DISPATCH_TOKEN }}
      CONFIG: ${{ secrets.DISPATCH_CONFIG }}
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

      - name: Wait for each target time and dispatch
        run: |
          set -euo pipefail
          TEST="${{ inputs.test_mode }}"
          # Parse the config ONCE, guarded: jq errors can echo input fragments,
          # so stderr is discarded and failures emit only generic messages.
          REPO=$(jq -er '.repo' <<<"$CONFIG" 2>/dev/null) \
            || { echo "::error::DISPATCH_CONFIG invalid (.repo) — fix the secret"; exit 1; }
          echo "REPO=$REPO" >> "$GITHUB_ENV"
          JOBS=$(jq -r '.jobs | sort_by(.sgt) | .[] | "\(.workflow)|\(.sgt)|\(.dow // "*")"' <<<"$CONFIG" 2>/dev/null) \
            || { echo "::error::DISPATCH_CONFIG invalid (.jobs) — fix the secret"; exit 1; }
          TODAY=$(TZ=Asia/Singapore date +%F)
          DOW_NOW=$(TZ=Asia/Singapore date +%a)

          # Re-enable target workflows in case GitHub auto-disabled their
          # fallback schedules (60 days without commits). No-op when enabled;
          # avoids keep-alive commits that would trigger the target's deploys.
          while IFS='|' read -r WF AT DOW; do
            [ -n "$WF" ] || continue
            gh workflow enable "$WF" -R "$REPO" >/dev/null 2>&1 || true
          done <<<"$JOBS"

          # Count today's (SGT) REAL-SEND runs of a workflow that are queued,
          # in progress, or already succeeded — i.e. "someone is handling it".
          already_handled() {
            gh run list -R "$REPO" --workflow "$1" --limit 100 \
              --json displayTitle,status,conclusion,createdAt \
              --jq "[ .[]
                      | select(.displayTitle | contains(\"REAL-SEND\"))
                      | select(.status != \"completed\" or .conclusion == \"success\")
                      | select(((.createdAt | fromdateiso8601) + 28800 | gmtime | strftime(\"%Y-%m-%d\")) == \"$TODAY\")
                    ] | length" 2>/dev/null || echo 0
          }

          i=0
          while IFS='|' read -r WF AT DOW; do
            [ -n "$WF" ] || continue
            i=$((i+1))
            # validate config-derived values so no other command can echo them
            case "$WF" in (*[!A-Za-z0-9._-]*|"") echo "job#$i: invalid workflow in config — skipping"; continue;; esac
            case "$AT" in ([0-1][0-9]:[0-5][0-9]|2[0-3]:[0-5][0-9]) ;; (*) echo "job#$i: invalid time in config — skipping"; continue;; esac
            if [ "$DOW" != "*" ] && [ "$DOW" != "$DOW_NOW" ]; then
              echo "job#$i: not due today"; continue
            fi
            if [ "$TEST" = "true" ]; then
              if gh workflow run "$WF" -R "$REPO" -f dry_run=true >/dev/null 2>&1; then
                echo "job#$i: TEST dispatch ok (dry-run)"
              else
                echo "job#$i: TEST dispatch FAILED"
              fi
              continue
            fi
            if [ "$(already_handled "$WF")" -gt 0 ]; then
              echo "job#$i: already handled today — skipping"; continue
            fi
            TARGET=$(TZ=Asia/Singapore date -d "$TODAY $AT:00" +%s 2>/dev/null) \
              || { echo "job#$i: time parse failed — skipping"; continue; }
            NOW=$(date +%s)
            if [ "$NOW" -gt $((TARGET + 21600)) ]; then
              echo "job#$i: >6h past target — leaving to the target's fallback cron"; continue
            fi
            if [ "$NOW" -lt "$TARGET" ]; then
              echo "job#$i: sleeping until target"
              sleep $((TARGET - NOW))
            fi
            ok=0
            for a in 1 2 3; do
              if gh workflow run "$WF" -R "$REPO" -f dry_run=false >/dev/null 2>&1; then ok=1; break; fi
              echo "job#$i: dispatch attempt $a failed; retrying"; sleep 15
            done
            if [ "$ok" != "1" ]; then
              echo "job#$i: ALL dispatch attempts failed — target's fallback cron will cover"; continue
            fi
            sleep 25
            if [ "$(already_handled "$WF")" -gt 0 ]; then
              echo "job#$i: dispatched and verified started"
            else
              echo "job#$i: run not visible yet — one more dispatch for safety"
              gh workflow run "$WF" -R "$REPO" -f dry_run=false >/dev/null 2>&1 || true
            fi
          done <<<"$JOBS"

      - name: Keep-alive commit (resets GitHub's 60-day schedule-disable timer)
        if: ${{ !cancelled() }}
        continue-on-error: true
        run: |
          set -u
          LAST=$(git log -1 --format=%ct)
          if [ $(( ( $(date +%s) - LAST ) / 86400 )) -ge 45 ]; then
            git config user.name "dispatch-bot"
            git config user.email "actions@users.noreply.github.com"
            git commit --allow-empty -m "keep-alive" >/dev/null
            git push >/dev/null 2>&1 && echo "keep-alive pushed"
          fi
